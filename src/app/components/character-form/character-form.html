<div class="max-w-4xl mx-auto p-6">
  <div class="mb-6">
    <h1 class="text-3xl font-bold text-gray-900">Create Character</h1>
    <p class="text-gray-600 mt-1">Fill in the details to create a new character</p>
  </div>

  <form (ngSubmit)="onSubmit()" class="space-y-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Name -->
      <div class="md:col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Character Name *
        </label>
        <input
          type="text"
          [(ngModel)]="name"
          name="name"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="Enter character name"
        />
      </div>

      <!-- Description -->
      <div class="md:col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Description *
        </label>
        <textarea
          [(ngModel)]="description"
          name="description"
          rows="2"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="Brief description of the character"
        ></textarea>
      </div>

      <!-- Appearance -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Appearance
        </label>
        <textarea
          [(ngModel)]="appearance"
          name="appearance"
          rows="3"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="Physical appearance details"
        ></textarea>
      </div>

      <!-- Personality -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Personality
        </label>
        <textarea
          [(ngModel)]="personality"
          name="personality"
          rows="3"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="Personality traits and characteristics"
        ></textarea>
      </div>

      <!-- Backstory -->
      <div class="md:col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Backstory
        </label>
        <textarea
          [(ngModel)]="backstory"
          name="backstory"
          rows="4"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="Character's background and history"
        ></textarea>
      </div>

      <!-- Tags -->
      <div class="md:col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Tags (comma-separated)
        </label>
        <input
          type="text"
          [(ngModel)]="tags"
          name="tags"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="e.g., warrior, magic, female"
        />
      </div>
    </div>

    <!-- Actions -->
    <div class="flex justify-end space-x-4 pt-4">
      <button
        type="button"
        (click)="cancel()"
        class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50"
      >
        Cancel
      </button>
      <button
        type="submit"
        [disabled]="isSubmitting"
        class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        {{ isSubmitting ? 'Creating...' : 'Create Character' }}
      </button>
    </div>
  </form>
</div>
