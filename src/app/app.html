<!-- Professional SaaS AI Studio Layout -->
<div class="min-h-screen bg-[var(--color-bg)]">
  <!-- Navbar -->
  <nav class="sticky top-0 z-40 glass border-b border-[var(--color-border)]">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <!-- Logo & Brand -->
        <div class="flex items-center gap-3">
          <div class="flex items-center justify-center w-10 h-10 rounded-xl bg-gradient-to-br from-[var(--color-primary-500)] to-[var(--color-accent-500)] shadow-md">
            <span class="text-white text-xl">🎭</span>
          </div>
          <div>
            <h1 class="text-lg font-bold text-[var(--color-text)] gradient-text">Persona Sintetis</h1>
            <p class="text-xs text-[var(--color-text-tertiary)]">AI Character Studio</p>
          </div>
        </div>

        <!-- Navigation Links -->
        <div class="hidden md:flex items-center gap-1">
          <a
            routerLink="/gallery"
            routerLinkActive="bg-[var(--color-primary-50)] text-[var(--color-primary-700)]"
            class="px-4 py-2 rounded-lg text-sm font-medium text-[var(--color-text-secondary)] hover:text-[var(--color-text)] hover:bg-[var(--color-bg-subtle)] transition-all"
          >
            Gallery
          </a>
          <a
            routerLink="/generate"
            routerLinkActive="bg-[var(--color-primary-50)] text-[var(--color-primary-700)]"
            class="px-4 py-2 rounded-lg text-sm font-medium text-[var(--color-text-secondary)] hover:text-[var(--color-text)] hover:bg-[var(--color-bg-subtle)] transition-all"
          >
            Generate
          </a>
          <a
            routerLink="/characters/new"
            routerLinkActive="bg-[var(--color-primary-50)] text-[var(--color-primary-700)]"
            class="px-4 py-2 rounded-lg text-sm font-medium text-[var(--color-text-secondary)] hover:text-[var(--color-text)] hover:bg-[var(--color-bg-subtle)] transition-all"
          >
            Create
          </a>
        </div>

        <!-- Action Button -->
        <div class="flex items-center gap-3">
          <a
            routerLink="/characters/new"
            class="btn btn-primary"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            <span class="hidden sm:inline">New Character</span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <router-outlet />
  </main>

  <!-- Footer -->
  <footer class="border-t border-[var(--color-border)] mt-auto">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
      <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
        <p class="text-sm text-[var(--color-text-tertiary)]">
          © 2024 Persona Sintetis — Professional AI Character Studio
        </p>
        <div class="flex items-center gap-4 text-sm text-[var(--color-text-tertiary)]">
          <span class="flex items-center gap-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
            Powered by Angular 21 + Tailwind v4
          </span>
        </div>
      </div>
    </div>
  </footer>
</div>
